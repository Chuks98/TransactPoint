name: transact_point
description: "Transact Point App."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1


environment:
  sdk: ^3.7.0


dependencies:
  flutter:
    sdk: flutter
  http: ^1.5.0
  flutter_dotenv: ^6.0.0
  cupertino_icons: ^1.0.8
  provider: ^6.0.5
  shared_preferences: ^2.1.1
  carousel_slider: ^5.1.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1



flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/logo.jpeg
    - assets/images/promo.png
    - assets/images/mtn-logo.png
    - assets/images/9mobile-logo.jpeg
    - assets/images/airtel-logo.png
    - assets/images/glo-logo.jpeg
    - assets/images/dstv-logo.jpeg
    - assets/images/gotv-logo.png
    - assets/images/startimes-logo.jpeg

# Flutter Launcher Icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.jpeg"
  # adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/logo.jpeg"


# Flutter Native Splash
flutter_native_splash:
  color: "#FFE5DD"  # 👈 your background color
  image: assets/images/logo.jpeg
  android: true
  ios: true
  web: false